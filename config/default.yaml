blender:
  executable: C:\Program Files\Blender Foundation\Blender 4.2\blender.exe
export:
  apply_modifiers: true
  export_tangents: true
  format: GLB
  image_format: AUTO
logging:
  level: INFO
render:
  denoise: true
  engine: CYCLES
  film_transparent: true
  gpu_enabled: true
  resolution:
  - 1920
  - 1080
  samples: 128
validation:
  enabled: true
