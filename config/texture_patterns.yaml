# PBR texture channel matching patterns.
# Each entry maps a channel name to a regex pattern (case-insensitive).
# The regex is tested against the file *stem* (no extension).
# First match wins; order of channels in this file defines priority.

channels:
  albedo:
    pattern: "(basecolor|base_color|base-color|albedo|diffuse|diff|col(?:or)?|(?<![a-z])bc(?![a-z])|(?<![a-z])aaa[xt]?(?![a-z]))(?!.*(?:ao|occl))"
    color_space: "sRGB"
    required: true

  # NNN-packed normal map: stores R=normalZ, G=normalX, B=normalY.
  # Requires a Separate Color + Combine XYZ swizzle before the Normal Map node.
  # Must be listed before the generic "normal" channel so it takes priority.
  nnn_normal:
    pattern: "(?<![a-z])nnn[xt]?(?![a-z])"
    color_space: "Non-Color"

  normal:
    pattern: "(normal|nrm|norm|nor|nml|(?<![a-z])n(?![a-z]))(?!.*(?:ao|occl))"
    color_space: "Non-Color"

  # MRO packed texture: R=Metallic, G=Roughness, B=Occlusion/AO.
  # Must be listed before generic "orm" so it takes priority.
  mro:
    pattern: "(?<![a-z])mro[xt]?(?![a-z])"
    color_space: "Non-Color"

  roughness:
    pattern: "(roughness|rough|rgh|gloss|glossiness)"
    color_space: "Non-Color"
    glossiness_keywords: ["gloss", "glossiness"]

  metallic:
    pattern: "(metallic|metal(?:ness)?|met(?![a-z]))"
    color_space: "Non-Color"

  ao:
    pattern: "((?:ambient.?)?occ(?:lusion)?|(?<![a-z])ao(?![a-z]))"
    color_space: "Non-Color"

  emissive:
    pattern: "(emissive|emission|emit|glow|self.?illum)"
    color_space: "sRGB"

  opacity:
    pattern: "(opacity|(?<![a-z])alpha(?![a-z])|transparency|trans(?![a-z]))(?!.*mask)"
    color_space: "Non-Color"

  displacement:
    pattern: "(displacement|disp|height|hgt)(?!.*norm)"
    color_space: "Non-Color"

  orm:
    pattern: "((?<![a-z])orm(?![a-z])|packed|(?<![a-z])arm(?![a-z])|(?<![a-z])rma(?![a-z]))"
    color_space: "Non-Color"

  # Gradient / ramp textures — recognized so they are never accidentally matched
  # as albedo.  They are NOT connected during material build because their
  # access method (geometry-normal-based UV) is incompatible with glTF.
  # prepare_for_glb_export() removes any ramp Mix nodes from the Base Color path.
  ramp:
    pattern: "(?<![a-z])ramp(?![a-z])"
    color_space: "sRGB"

# Supported image file extensions (lowercase, with leading dot).
image_extensions:
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".tga"
  - ".tiff"
  - ".tif"
  - ".exr"
  - ".bmp"

# When multiple candidates match the same channel, prefer formats in this order.
format_priority:
  - ".png"
  - ".exr"
  - ".tga"
  - ".jpg"
  - ".jpeg"
  - ".tiff"
  - ".tif"
  - ".bmp"
